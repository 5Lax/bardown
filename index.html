<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BARDOWN — Arcade Box Lacrosse</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥍</text></svg>">
<style>
  html,body{margin:0;height:100%;background:#0b0d12;color:#dfe6ee;font-family:Arial,Helvetica,sans-serif;overflow:hidden}
  #wrap{position:relative;display:flex;align-items:center;justify-content:center;height:100%}
  #wrap canvas{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:6px}
  #gl{background:#0b0d12;box-shadow:0 0 40px #000a}
  #game{background:transparent}
  #hint{position:fixed;left:0;right:0;bottom:6px;text-align:center;font-size:12px;color:#7e8a99;user-select:none}
  #hint b{color:#cdd7e2}
</style>
</head>
<body>
<div id="wrap"><canvas id="gl" width="1280" height="720"></canvas><canvas id="game" width="1280" height="720"></canvas></div>
<div id="hint"><b>W</b> attack, <b>ASD</b> around &middot; <b>mouse</b> aim &middot; <b>L-click</b> tap = pass / hold = shoot &middot; <b>R-click</b> check, <b>double = TACKLE</b> &middot; <b>SPACE</b> jump &middot; <b>P</b> pause &middot; <b>M</b> mute</div>
<script src="vendor/three.min.js"></script>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/audio.js"></script>
<script src="js/input.js"></script>
<script src="js/effects.js"></script>
<script src="js/entities.js"></script>
<script src="js/ai.js"></script>
<script src="js/game.js"></script>
<script src="js/render.js"></script>
<script src="js/render3d.js"></script>
<script src="js/debug.js"></script>
<script src="js/main.js"></script>
</body>
</html>
